services:
  - type: web
    name: kawasaki-keiba
    runtime: python
    buildCommand: pip install .
    startCommand: uvicorn kawasaki_keiba.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: KAWASAKI_PROJECT_ROOT
        value: /opt/render/project/src
    plan: free
